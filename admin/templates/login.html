<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AXEN Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif; min-height: 100vh;
      background: #111111;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .login-container {
      width: 100%; max-width: 420px;
    }
    .login-brand {
      text-align: center; margin-bottom: 30px;
    }
    .login-brand-icon {
      width: 60px; height: 60px; border-radius: 16px; margin: 0 auto 15px;
      background: #C8102E;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; color: #fff;
    }
    .login-brand h1 { font-size: 26px; color: #fff; font-weight: 700; }
    .login-brand h1 span { color: #C8102E; }
    .login-brand p { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 5px; }

    .login-card {
      background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 16px;
      padding: 40px;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .input-wrap {
      position: relative;
    }
    .input-wrap i {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,0.3); font-size: 15px;
    }
    .input-wrap input {
      width: 100%; padding: 12px 14px 12px 42px; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      color: #fff; font-size: 14px; font-family: inherit; outline: none;
      transition: all 0.3s;
    }
    .input-wrap input:focus {
      border-color: #C8102E; box-shadow: 0 0 0 3px rgba(200,16,46,0.2);
    }
    .input-wrap input::placeholder { color: rgba(255,255,255,0.3); }

    .btn-login {
      width: 100%; padding: 14px; background: #C8102E;
      border: none; border-radius: 10px; color: #fff; font-size: 15px;
      font-weight: 600; cursor: pointer; transition: all 0.3s;
      font-family: inherit;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(200,16,46,0.35); }

    .alert {
      padding: 12px 16px; border-radius: 8px; margin-bottom: 20px;
      font-size: 13px; display: flex; align-items: center; gap: 8px;
    }
    .alert-danger { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
    .alert-warning { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.2); }
    .alert-info { background: rgba(59,130,246,0.15); color: #3b82f6; border: 1px solid rgba(59,130,246,0.2); }

    .login-footer { text-align: center; margin-top: 20px; color: rgba(255,255,255,0.3); font-size: 12px; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-brand">
      <div class="login-brand-icon"><i class="fas fa-cube"></i></div>
      <h1>AX<span>EN</span> CMS</h1>
      <p>Admin Panel — Sign in to continue</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{ category }}"><i class="fas fa-exclamation-circle"></i> {{ message }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <div class="login-card">
      <form method="POST">
        <div class="form-group">
          <label>Username</label>
          <div class="input-wrap">
            <i class="fas fa-user"></i>
            <input type="text" name="username" placeholder="Enter your username" required autofocus>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="Enter your password" required>
          </div>
        </div>
        <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Sign In</button>
      </form>
    </div>

    <div class="login-footer">
      <p>Default: admin / admin123</p>
    </div>
  </div>
</body>
</html>
