{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block page_title %}Site Settings{% endblock %}
{% block breadcrumb %}<span>Settings</span>{% endblock %}

{% block content %}
<form method="POST">
  <!-- General -->
  <div class="card" style="margin-bottom: 24px;">
    <div class="card-header">
      <h3><i class="fas fa-cog" style="color: var(--primary); margin-right: 8px;"></i> General Settings</h3>
    </div>
    <div class="card-body">
      <div class="form-row">
        <div class="form-group">
          <label>Site Name</label>
          <input type="text" name="site_name" class="form-control" value="{{ site.site_name }}">
        </div>
        <div class="form-group">
          <label>Tagline</label>
          <input type="text" name="site_tagline" class="form-control" value="{{ site.site_tagline }}">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="site_email" class="form-control" value="{{ site.site_email }}">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" name="site_phone" class="form-control" value="{{ site.site_phone }}">
        </div>
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" name="site_address" class="form-control" value="{{ site.site_address }}">
      </div>
      <div class="form-group">
        <label>Footer Text</label>
        <input type="text" name="footer_text" class="form-control" value="{{ site.footer_text }}">
      </div>
      <div class="form-group">
        <label class="form-check">
          <input type="checkbox" name="maintenance_mode" {% if site.maintenance_mode %}checked{% endif %}>
          <span>Maintenance Mode (site offline)</span>
        </label>
      </div>
    </div>
  </div>

  <!-- Social Media -->
  <div class="card" style="margin-bottom: 24px;">
    <div class="card-header">
      <h3><i class="fas fa-share-alt" style="color: var(--accent); margin-right: 8px;"></i> Social Media</h3>
    </div>
    <div class="card-body">
      <div class="form-row">
        <div class="form-group">
          <label><i class="fab fa-facebook" style="color: #1877f2;"></i> Facebook</label>
          <input type="url" name="facebook" class="form-control" value="{{ site.facebook }}">
        </div>
        <div class="form-group">
          <label><i class="fab fa-twitter" style="color: #1da1f2;"></i> Twitter</label>
          <input type="url" name="twitter" class="form-control" value="{{ site.twitter }}">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label><i class="fab fa-linkedin" style="color: #0a66c2;"></i> LinkedIn</label>
          <input type="url" name="linkedin" class="form-control" value="{{ site.linkedin }}">
        </div>
        <div class="form-group">
          <label><i class="fab fa-instagram" style="color: #e4405f;"></i> Instagram</label>
          <input type="url" name="instagram" class="form-control" value="{{ site.instagram }}">
        </div>
      </div>
      <div class="form-group">
        <label><i class="fab fa-youtube" style="color: #ff0000;"></i> YouTube</label>
        <input type="url" name="youtube" class="form-control" value="{{ site.youtube }}">
      </div>
    </div>
  </div>

  <!-- Advanced -->
  <div class="card" style="margin-bottom: 24px;">
    <div class="card-header">
      <h3><i class="fas fa-code" style="color: var(--warning); margin-right: 8px;"></i> Advanced</h3>
    </div>
    <div class="card-body">
      <div class="form-group">
        <label>Analytics Code (Google Analytics, etc.)</label>
        <textarea name="analytics_code" class="form-control" rows="4" placeholder="Paste your tracking code here...">{{ site.analytics_code }}</textarea>
      </div>
      <div class="form-group">
        <label>Custom CSS</label>
        <textarea name="custom_css" class="form-control" rows="4" placeholder="Custom CSS overrides..." style="font-family: monospace; font-size: 13px;">{{ site.custom_css }}</textarea>
      </div>
      <div class="form-group">
        <label>Custom JavaScript</label>
        <textarea name="custom_js" class="form-control" rows="4" placeholder="Custom JavaScript..." style="font-family: monospace; font-size: 13px;">{{ site.custom_js }}</textarea>
      </div>
    </div>
  </div>

  <button type="submit" class="btn btn-primary" style="padding: 14px 40px;">
    <i class="fas fa-save"></i> Save All Settings
  </button>
</form>
{% endblock %}
