{% extends "base.html" %}
{% block title %}{{ 'Edit' if user else 'New' }} User{% endblock %}
{% block page_title %}{{ 'Edit' if user else 'New' }} User{% endblock %}
{% block breadcrumb %}<a href="{{ url_for('users_list') }}">Users</a> <span>/</span> <span>{{ 'Edit' if user else 'New' }}</span>{% endblock %}

{% block content %}
<div class="card">
  <div class="card-body">
    <form method="POST">
      <div class="form-row">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" class="form-control" value="{{ user.username if user else '' }}" required>
        </div>
        <div class="form-group">
          <label>Display Name</label>
          <input type="text" name="display_name" class="form-control" value="{{ user.display_name if user else '' }}">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" class="form-control" value="{{ user.email if user else '' }}" required>
        </div>
        <div class="form-group">
          <label>Role</label>
          <select name="role" class="form-control">
            <option value="admin" {% if user and user.role == 'admin' %}selected{% endif %}>Admin</option>
            <option value="editor" {% if user and user.role == 'editor' %}selected{% endif %}>Editor</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Password {% if user %}<small style="color: var(--text-secondary);">(leave blank to keep current)</small>{% endif %}</label>
        <input type="password" name="password" class="form-control" {% if not user %}required{% endif %}>
      </div>
      <div class="btn-group">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save User</button>
        <a href="{{ url_for('users_list') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
