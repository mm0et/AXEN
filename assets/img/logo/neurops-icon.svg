<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#061122"/>
      <stop offset="100%" style="stop-color:#0d2040"/>
    </linearGradient>
    <linearGradient id="nG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4793b"/>
      <stop offset="100%" style="stop-color:#e05e20"/>
    </linearGradient>
    <filter id="g1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g2">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#bgG)" stroke="#f4793b" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Hex frame -->
  <polygon points="60,10 95,30 95,70 60,90 25,70 25,30"
    fill="#f4793b" fill-opacity="0.07"
    stroke="#f4793b" stroke-width="1.3" stroke-opacity="0.4"/>

  <!-- Connection lines -->
  <line x1="45" y1="34" x2="60" y2="47" stroke="#f4793b" stroke-width="1.3" opacity="0.55"/>
  <line x1="75" y1="34" x2="60" y2="47" stroke="#f4793b" stroke-width="1.3" opacity="0.55"/>
  <line x1="45" y1="34" x2="60" y2="59" stroke="#f4793b" stroke-width="0.8" opacity="0.3"/>
  <line x1="75" y1="34" x2="45" y2="59" stroke="#f4793b" stroke-width="0.8" opacity="0.3"/>
  <line x1="60" y1="47" x2="45" y2="59" stroke="#f4793b" stroke-width="1.3" opacity="0.55"/>
  <line x1="60" y1="47" x2="75" y2="59" stroke="#f4793b" stroke-width="1.3" opacity="0.55"/>
  <line x1="45" y1="59" x2="60" y2="72" stroke="#f4793b" stroke-width="1.3" opacity="0.55"/>
  <line x1="75" y1="59" x2="60" y2="72" stroke="#f4793b" stroke-width="1.3" opacity="0.55"/>
  <line x1="45" y1="59" x2="75" y2="59" stroke="#f4793b" stroke-width="0.8" opacity="0.22"/>

  <!-- Side connectors -->
  <line x1="36" y1="47" x2="45" y2="34" stroke="#f4793b" stroke-width="0.9" opacity="0.4"/>
  <line x1="36" y1="47" x2="45" y2="59" stroke="#f4793b" stroke-width="1" opacity="0.45"/>
  <line x1="84" y1="47" x2="75" y2="34" stroke="#f4793b" stroke-width="0.9" opacity="0.4"/>
  <line x1="84" y1="47" x2="75" y2="59" stroke="#f4793b" stroke-width="1" opacity="0.45"/>

  <!-- Input nodes -->
  <circle cx="45" cy="34" r="5.5" fill="#0d2040" stroke="#f4793b" stroke-width="2" filter="url(#g1)"/>
  <circle cx="75" cy="34" r="5.5" fill="#0d2040" stroke="#f4793b" stroke-width="2" filter="url(#g1)"/>
  <circle cx="36" cy="47" r="3.8" fill="#0d2040" stroke="#f4793b" stroke-width="1.5" stroke-opacity="0.7"/>
  <circle cx="84" cy="47" r="3.8" fill="#0d2040" stroke="#f4793b" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- Hidden layer (filled = active) -->
  <circle cx="60" cy="47" r="7.5" fill="url(#nG)" filter="url(#g2)"/>
  <circle cx="45" cy="59" r="6" fill="url(#nG)" filter="url(#g1)"/>
  <circle cx="75" cy="59" r="6" fill="url(#nG)" filter="url(#g1)"/>

  <!-- Output node -->
  <circle cx="60" cy="72" r="8" fill="#0d2040" stroke="#f4793b" stroke-width="2.5" filter="url(#g2)"/>
  <circle cx="60" cy="72" r="4" fill="#f4793b"/>

  <!-- Hex corner accents -->
  <circle cx="60" cy="10" r="3" fill="#f4793b" opacity="0.9"/>
  <circle cx="95" cy="30" r="2.2" fill="#f4793b" opacity="0.6"/>
  <circle cx="95" cy="70" r="2.2" fill="#f4793b" opacity="0.6"/>
  <circle cx="60" cy="90" r="3" fill="#f4793b" opacity="0.9"/>
  <circle cx="25" cy="70" r="2.2" fill="#f4793b" opacity="0.6"/>
  <circle cx="25" cy="30" r="2.2" fill="#f4793b" opacity="0.6"/>

  <!-- N + O initials at bottom -->
  <text x="60" y="112"
    font-family="'Segoe UI', 'Arial Black', sans-serif"
    font-size="11" font-weight="800" letter-spacing="4"
    fill="#f4793b" text-anchor="middle">NEUROPS</text>

</svg>